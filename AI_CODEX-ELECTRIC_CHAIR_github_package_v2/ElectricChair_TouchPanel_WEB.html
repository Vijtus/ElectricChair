<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Electric Chair Touch Panel</title>
  <style>
    :root {
      --panel-bg: #000;
      --screen-bg: #fff;
      --ink: #fff;
      --accent: #f00;
      --active-fill: #fff;
      --active-text: #000;
      --font-ui: Inter, Arial, Helvetica, sans-serif;
      --panel-ratio: 1.7868020305;
      --font-landscape: clamp(.72rem, 1.18vw, 1.5rem);
      --font-portrait: clamp(.94rem, 2.55vw, 1.32rem);
      --gap-portrait: clamp(.72rem, 2.2vw, 1.05rem);
      --pad-portrait: clamp(.78rem, 2.8vw, 1.15rem);
      --power-portrait: clamp(4.4rem, 18vw, 6rem);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-block-size: 100%;
    }

    body {
      display: grid;
      place-items: center;
      min-block-size: 100dvh;
      overflow: hidden;
      background: var(--panel-bg);
      color: var(--ink);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      user-select: none;
    }

    .defs {
      position: fixed;
      inline-size: 0;
      block-size: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .panel {
      inline-size: min(100vw, calc(100dvh * var(--panel-ratio)));
      aspect-ratio: 1408 / 788;
      display: grid;
      grid-template-columns: 22fr 3.5fr 126fr 15.5fr 68fr 129fr 700fr 127fr 66fr 147fr 4fr;
      grid-template-rows: 14fr 538fr 45fr 177fr 14fr;
      background: var(--panel-bg);
      overflow: hidden;
      isolation: isolate;
    }

    .screen,
    .stack,
    .bottom-grid,
    .power {
      min-inline-size: 0;
      min-block-size: 0;
    }

    .screen {
      grid-column: 7;
      grid-row: 2;
      inline-size: 100%;
      block-size: auto;
      aspect-ratio: 700 / 470;
      align-self: start;
      background: var(--screen-bg);
      transform: translateY(.212766%);
    }

    .controls {
      display: contents;
    }

    .stack {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 78fr 14fr 78fr 14fr 78fr 14fr 78fr 14fr 78fr 14fr 78fr;
      align-self: stretch;
    }

    .stack > .btn:nth-child(1) { grid-row: 1; }
    .stack > .btn:nth-child(2) { grid-row: 3; }
    .stack > .btn:nth-child(3) { grid-row: 5; }
    .stack > .btn:nth-child(4) { grid-row: 7; }
    .stack > .btn:nth-child(5) { grid-row: 9; }
    .stack > .btn:nth-child(6) { grid-row: 11; }

    .stack--left {
      grid-column: 2 / 6;
      grid-row: 2;
    }

    .stack--right {
      grid-column: 9 / 11;
      grid-row: 2;
    }

    .bottom-grid {
      grid-column: 5 / 10;
      grid-row: 4;
      display: grid;
      grid-template-columns: 202fr 20fr 202fr 20fr 202fr 20fr 202fr 20fr 202fr;
      grid-template-rows: 81fr 15fr 81fr;
    }

    .bottom-grid > .btn:nth-child(1) { grid-column: 1; grid-row: 1; }
    .bottom-grid > .btn:nth-child(2) { grid-column: 3; grid-row: 1; }
    .bottom-grid > .btn:nth-child(3) { grid-column: 5; grid-row: 1; }
    .bottom-grid > .btn:nth-child(4) { grid-column: 7; grid-row: 1; }
    .bottom-grid > .btn:nth-child(5) { grid-column: 9; grid-row: 1; }
    .bottom-grid > .btn:nth-child(6) { grid-column: 1; grid-row: 3; }
    .bottom-grid > .btn:nth-child(7) { grid-column: 3; grid-row: 3; }
    .bottom-grid > .btn:nth-child(8) { grid-column: 5; grid-row: 3; }
    .bottom-grid > .btn:nth-child(9) { grid-column: 7; grid-row: 3; }
    .bottom-grid > .btn:nth-child(10) { grid-column: 9; grid-row: 3; }

    .btn,
    .power {
      position: relative;
      display: grid;
      place-items: center;
      inline-size: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      outline: 0;
      appearance: none;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: filter .14s ease;
    }

    .stack .btn,
    .bottom-grid .btn {
      block-size: 100%;
    }

    .shape,
    .power-svg {
      position: absolute;
      inset: 0;
      inline-size: 100%;
      block-size: 100%;
      display: block;
      overflow: visible;
      pointer-events: none;
    }

    .shape__fill,
    .power__fill {
      fill: transparent;
      transition: fill .14s ease;
    }

    .shape__stroke,
    .power__stroke {
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      transition: stroke .14s ease;
    }

    .label {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      gap: .08em;
      inline-size: 100%;
      padding-inline: .55em;
      padding-block-end: .22em;
      color: currentColor;
      font-size: var(--font-landscape);
      line-height: 1.08;
      text-align: center;
      pointer-events: none;
    }

    .btn:is(:hover, :focus-visible),
    .power:is(:hover, :focus-visible) {
      filter: brightness(1.06);
    }

    .btn.is-active .shape__fill,
    .power.is-active .power__fill {
      fill: var(--active-fill) !important;
    }

    .btn.is-active,
    .btn.is-active .label,
    .btn.is-active .shape__stroke,
    .power.is-active,
    .power.is-active .power__stroke {
      color: var(--active-text) !important;
      stroke: var(--active-text) !important;
    }

    .power {
      grid-column: 3;
      grid-row: 4;
      align-self: start;
      justify-self: stretch;
      block-size: auto;
      aspect-ratio: 1;
      transform: translateY(20.238095%);
    }

    .power__fill {
      fill: var(--accent);
    }

    @media (orientation: portrait) {
      body {
        place-items: stretch;
        overflow: hidden;
      }

      .panel {
        inline-size: 100vw;
        block-size: 100dvh;
        aspect-ratio: auto;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(22svh, 32svh) auto minmax(0, 1fr);
        padding: var(--pad-portrait);
        row-gap: var(--gap-portrait);
        overflow: hidden;
      }

      .controls {
        grid-column: 1;
        grid-row: 3;
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--gap-portrait);
        min-block-size: 0;
        overflow: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding-inline-end: .12rem;
      }

      .screen {
        grid-column: 1;
        grid-row: 1;
        inline-size: 100%;
        block-size: 100%;
        aspect-ratio: auto;
        transform: none;
      }

      .power {
        grid-column: 1;
        grid-row: 2;
        inline-size: var(--power-portrait);
        justify-self: start;
        transform: none;
      }

      .stack,
      .bottom-grid {
        grid-column: 1;
      }

      .stack {
        grid-template-columns: 1fr;
        grid-template-rows: none;
        gap: var(--gap-portrait);
      }

      .stack > .btn:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
      }

      .stack--left {
        grid-row: auto;
      }

      .stack--right {
        grid-row: auto;
      }

      .bottom-grid {
        grid-row: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: none;
        gap: var(--gap-portrait);
        align-content: start;
        min-block-size: 0;
        padding-block-end: .4rem;
      }

      .bottom-grid > .btn:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
      }

      .stack .btn {
        block-size: auto;
        aspect-ratio: 213 / 78;
      }

      .bottom-grid .btn {
        block-size: auto;
        aspect-ratio: 202 / 81;
      }

      .label {
        font-size: var(--font-portrait);
        padding-inline: .72em;
        padding-block-end: .2em;
      }
    }

    @media (orientation: portrait) and (max-width: 30rem) {
      .bottom-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn,
      .power,
      .shape__fill,
      .shape__stroke,
      .power__fill,
      .power__stroke {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <svg class="defs" aria-hidden="true" focusable="false">
    <defs>
      <path id="shape-side" d="M 8 0 H 205 C 209.418 0 213 3.582 213 8 V 65 C 213 69.418 209.418 73 205 73 H 132 L 125 78 H 88 L 81 73 H 8 C 3.582 73 0 69.418 0 65 V 8 C 0 3.582 3.582 0 8 0 Z"></path>
      <path id="shape-bottom" d="M 8 0 H 194 C 198.418 0 202 3.582 202 8 V 68 C 202 72.418 198.418 76 194 76 H 129 L 122 81 H 80 L 73 76 H 8 C 3.582 76 0 72.418 0 68 V 8 C 0 3.582 3.582 0 8 0 Z"></path>

        <button class="btn js-toggle" type="button" aria-pressed="false">

        <button class="btn js-toggle" type="button" aria-pressed="false">

          <span class="label">Siła nacisku -</span>

        <button class="btn js-toggle" type="button" aria-pressed="false">

          <span class="label">Szyja</span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 213 78" aria-hidden="true"><use href="#shape-side" class="shape__fill"></use><use href="#shape-side" class="shape__stroke" stroke-width="2.75"></use></svg>
          <span class="label"><span>Do przodu</span><span>/Do tyłu</span></span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 213 78" aria-hidden="true"><use href="#shape-side" class="shape__fill"></use><use href="#shape-side" class="shape__stroke" stroke-width="2.75"></use></svg>

        <button class="btn js-toggle" type="button" aria-pressed="false">

          <span class="label"><span>Do przodu</span><span>/Do tyłu</span></span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 213 78" aria-hidden="true"><use href="#shape-side" class="shape__fill"></use><use href="#shape-side" class="shape__stroke" stroke-width="2.75"></use></svg>
          <span class="label">Prędkość +</span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 213 78" aria-hidden="true"><use href="#shape-side" class="shape__fill"></use><use href="#shape-side" class="shape__stroke" stroke-width="2.75"></use></svg>

      <div class="bottom-grid" aria-label="Bottom controls">
        <button class="btn js-toggle" type="button" aria-pressed="false">

        <button class="btn js-toggle" type="button" aria-pressed="false">

          <span class="label">Czas</span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 202 81" aria-hidden="true"><use href="#shape-bottom" class="shape__fill"></use><use href="#shape-bottom" class="shape__stroke" stroke-width="2.75"></use></svg>

        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 202 81" aria-hidden="true"><use href="#shape-bottom" class="shape__fill"></use><use href="#shape-bottom" class="shape__stroke" stroke-width="2.75"></use></svg>
          <span class="label"><span>Oparcie</span><span>w górę</span></span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 202 81" aria-hidden="true"><use href="#shape-bottom" class="shape__fill"></use><use href="#shape-bottom" class="shape__stroke" stroke-width="2.75"></use></svg>
          <span class="label"><span>Prędkość masażu</span><span>stóp</span></span>

          <span class="label"><span>Tryb</span><span>automatyczny</span></span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">

  <script>
  (() => {
    const root = document;

    const powerButton = root.querySelector('.power');
    const leftButtons = Array.from(root.querySelectorAll('.stack--left .btn'));
    const rightButtons = Array.from(root.querySelectorAll('.stack--right .btn'));
    const bottomButtons = Array.from(root.querySelectorAll('.bottom-grid .btn'));

    const DOM = {
      power: powerButton,

      // Left stack
      ramiona: leftButtons[0],                 // "Ramiona" -> 0x13
      przedramiona: leftButtons[1],            // "Przedramiona" -> 0x12
      nogi: leftButtons[2],                    // "Nogi" -> 0x11
      sila_nacisku_plus: leftButtons[3],       // "Siła nacisku +" -> 0x10
      sila_nacisku_minus: leftButtons[4],      // "Siła nacisku -" -> 0x0F
      masaz_posladkow: leftButtons[5],         // "Masaż pośladków" -> 0x0E

      // Right stack
      szyja: rightButtons[0],                  // "Szyja" -> 0x19
      do_przodu_do_tylu_1: rightButtons[1],    // first "Do przodu / Do tyłu" -> 0x16
      plecy_i_talia: rightButtons[2],          // "Plecy i talia" -> 0x17
      do_przodu_do_tylu_2: rightButtons[3],    // second "Do przodu / Do tyłu" -> 0x18
      predkosc_plus: rightButtons[4],          // "Prędkość +" -> 0x15
      predkosc_minus: rightButtons[5],         // "Prędkość -" -> 0x14

      // Bottom grid
      masaz_stop: bottomButtons[0],            // HTML label "Masaż stóp" -> protocol masaz_stop 0x0D
      pauza: bottomButtons[1],                 // "Pauza" -> 0x0B
      czas: bottomButtons[2],                  // "Czas" -> 0x07
      grawitacja_zero: bottomButtons[3],       // "Grawitacja Zero" -> 0x08
      oparcie_w_gore: bottomButtons[4],        // "Oparcie w górę" -> 0x09
      predkosc_masazu_stop: bottomButtons[5],  // HTML label "Prędkość masażu stóp" -> predkosc_masazu_stop 0x02
      ogrzewanie: bottomButtons[6],            // "Ogrzewanie" -> 0x03
      masaz_calego_ciala: bottomButtons[7],    // "Masaż Całego Ciała" -> 0x04
      tryb_automatyczny: bottomButtons[8],     // "Tryb automatyczny" -> 0x05
      oparcie_w_dol: bottomButtons[9]          // "Oparcie w dół" -> 0x06
    };

    const buttonToCommand = new Map(
      Object.entries(DOM)
        .filter(([key, button]) => key !== 'power' && button)
        .map(([key, button]) => [button, key])
    );

    const DEAD_IN_AUTO = new Set([
      'pauza',
      'do_przodu_do_tylu_2'
    ]);

    // These are one-shot / scalar / movement style commands:
    // they should blink briefly, not remain highlighted.
    const MOMENTARY_COMMANDS = new Set([
      'sila_nacisku_plus',
      'sila_nacisku_minus',
      'predkosc_plus',
      'predkosc_minus',
      'do_przodu_do_tylu_1',
      'do_przodu_do_tylu_2',
      'grawitacja_zero',
      'oparcie_w_gore',
      'oparcie_w_dol'
    ]);

    const pulseState = new Set();
    const pulseTimers = new Map();
    const PULSE_MS = 180;

    const state = {
      powerOn: false,

      // Virtual protocol bytes
      bytes: {
        3: 0x00,
        4: 0x00,
        5: 0x00,
        6: 0x00
      },

      // Semantic layer to resolve ambiguous signatures
      semantic: {
        sharedOwner: null,   // persistent owner for the shared 04/02/0C/0F signature
        intensity: null,     // plus/minus are momentary, but still modify bytes
        auto: false,
        fullBody: false,
        neck: false,
        backWaist: false,
        clearSource: null
      }
    };

    function setBytes(b3, b4, b5, b6) {
      state.bytes[3] = b3;
      state.bytes[4] = b4;
      state.bytes[5] = b5;
      state.bytes[6] = b6;
    }

    function clearSemantic() {
      state.semantic.sharedOwner = null;
      state.semantic.intensity = null;
      state.semantic.auto = false;
      state.semantic.fullBody = false;
      state.semantic.neck = false;
      state.semantic.backWaist = false;
      state.semantic.clearSource = null;
    }

    function clearNonZoneSemantic() {
      state.semantic.sharedOwner = null;
      state.semantic.intensity = null;
      state.semantic.auto = false;
      state.semantic.fullBody = false;
      state.semantic.clearSource = null;
    }

    function isAllZero() {
      return (
        state.bytes[3] === 0x00 &&
        state.bytes[4] === 0x00 &&
        state.bytes[5] === 0x00 &&
        state.bytes[6] === 0x00
      );
    }

    function isRunningSignature() {
      return (
        state.bytes[3] === 0x04 &&
        state.bytes[4] === 0x02 &&
        state.bytes[5] === 0x0C &&
        state.bytes[6] === 0x0F
      );
    }

    function isAutoActive() {
      return state.semantic.auto && isRunningSignature();
    }

    function pulseCommand(command) {
      pulseState.add(command);

      const existingTimer = pulseTimers.get(command);
      if (existingTimer) clearTimeout(existingTimer);

      const timer = setTimeout(() => {
        pulseState.delete(command);
        pulseTimers.delete(command);
        render();
      }, PULSE_MS);

      pulseTimers.set(command, timer);
    }

    function zoneTailAfterOverride() {
      if (state.semantic.fullBody) return { b5: 0x0C, b6: 0x0F };
      if (state.semantic.auto) return { b5: 0x00, b6: 0x00 };
      if (state.semantic.clearSource) return { b5: 0x00, b6: 0x00 };
      if (state.semantic.sharedOwner || state.semantic.intensity) return { b5: 0x00, b6: 0x00 };

      return { b5: state.bytes[5], b6: state.bytes[6] };
    }

    function applySharedRunning(command) {
      clearSemantic();
      state.semantic.sharedOwner = command;
      setBytes(0x04, 0x02, 0x0C, 0x0F);
    }

    function applyIntensityPlus() {
      clearSemantic();
      state.semantic.intensity = 'sila_nacisku_plus';
      setBytes(0x04, 0x02, 0x0F, 0x0F);
    }

    function applyIntensityMinus() {
      clearSemantic();
      state.semantic.intensity = 'sila_nacisku_minus';
      setBytes(0x04, 0x02, 0x00, 0x0F);
    }

    function applyFullBody() {
      clearSemantic();
      state.semantic.fullBody = true;
      setBytes(0x04, 0x02, 0x0C, 0x0F);
    }

    function applyAuto() {
      clearSemantic();
      state.semantic.auto = true;
      setBytes(0x04, 0x02, 0x0C, 0x0F);
    }

    function applyClear(command) {
      clearSemantic();
      state.semantic.clearSource = command;
      setBytes(0x00, 0x00, 0x00, 0x00);
    }

    function applyBackWaist() {
      const tail = zoneTailAfterOverride();
      const preserveNeck = state.semantic.neck;

      clearNonZoneSemantic();
      state.semantic.backWaist = true;
      state.semantic.neck = preserveNeck;

      setBytes(
        0x04,
        preserveNeck ? 0x0E : 0x0C,
        tail.b5,
        tail.b6
      );
    }

    function applyNeck() {
      const tail = zoneTailAfterOverride();
      const preserveBackWaist = state.semantic.backWaist;

      clearNonZoneSemantic();
      state.semantic.backWaist = preserveBackWaist;
      state.semantic.neck = true;

      setBytes(
        preserveBackWaist ? 0x04 : 0x00,
        0x0E,
        tail.b5,
        tail.b6
      );
    }

    function handleCommand(command) {
      if (isAutoActive() && DEAD_IN_AUTO.has(command)) {
        return;
      }

      if (MOMENTARY_COMMANDS.has(command)) {
        pulseCommand(command);
      }

      switch (command) {
        case 'ramiona':
        case 'przedramiona':
        case 'nogi':
        case 'masaz_posladkow':
        case 'masaz_stop':
        case 'pauza':
        case 'czas':
        case 'ogrzewanie':
        case 'predkosc_masazu_stop':
          applySharedRunning(command);
          break;

        case 'predkosc_plus':
        case 'predkosc_minus':
        case 'do_przodu_do_tylu_1':
        case 'do_przodu_do_tylu_2':
          // Protocol shows the generic running signature, but UX should be momentary.
          // Update bytes, but do not keep a persistent "owner".
          setBytes(0x04, 0x02, 0x0C, 0x0F);
          state.semantic.sharedOwner = null;
          state.semantic.intensity = null;
          state.semantic.auto = false;
          state.semantic.fullBody = false;
          state.semantic.clearSource = null;
          break;

        case 'sila_nacisku_plus':
          applyIntensityPlus();
          break;

        case 'sila_nacisku_minus':
          applyIntensityMinus();
          break;

        case 'masaz_calego_ciala':
          if (state.semantic.auto || state.semantic.clearSource === 'grawitacja_zero') {
            clearSemantic();
            setBytes(0x04, 0x02, 0x00, 0x00);
          } else {
            applyFullBody();
          }
          break;

        case 'tryb_automatyczny':
          applyAuto();
          break;

        case 'grawitacja_zero':
          applyClear('grawitacja_zero');
          break;

        case 'oparcie_w_gore':
          applyClear('oparcie_w_gore');
          break;

        case 'oparcie_w_dol':
          applyClear('oparcie_w_dol');
          break;

        case 'plecy_i_talia':
          applyBackWaist();
          break;

        case 'szyja':
          applyNeck();
          break;

        default:
          break;
      }
    }

    function isCommandActive(command) {
      // momentary flash always wins visually
      if (pulseState.has(command)) return true;

      switch (command) {
        case 'ramiona':
        case 'przedramiona':
        case 'nogi':
        case 'masaz_posladkow':
        case 'masaz_stop':
        case 'pauza':
        case 'czas':
        case 'ogrzewanie':
        case 'predkosc_masazu_stop':
          return state.semantic.sharedOwner === command && isRunningSignature();

        case 'sila_nacisku_plus':
          // only blink, do not latch
          return false;

        case 'sila_nacisku_minus':
          // only blink, do not latch
          return false;

        case 'predkosc_plus':
        case 'predkosc_minus':
        case 'do_przodu_do_tylu_1':
        case 'do_przodu_do_tylu_2':
          // only blink, do not latch
          return false;

        case 'masaz_calego_ciala':
          return state.semantic.fullBody && isRunningSignature();

        case 'tryb_automatyczny':
          return isAutoActive();

        case 'grawitacja_zero':
        case 'oparcie_w_gore':
        case 'oparcie_w_dol':
          // action buttons: blink only
          return false;

        case 'plecy_i_talia':
          return (
            state.semantic.backWaist &&
            state.bytes[3] === 0x04 &&
            (state.bytes[4] === 0x0C || state.bytes[4] === 0x0E)
          );

        case 'szyja':
          return state.semantic.neck && state.bytes[4] === 0x0E;

        default:
          return false;
      }
    }

    function paintBlocked(button, blocked) {
      button.setAttribute('aria-disabled', String(blocked));
      button.style.opacity = blocked ? '0.38' : '';
      button.style.filter = blocked ? 'grayscale(1)' : '';
      button.style.cursor = blocked ? 'not-allowed' : '';
    }

    function render() {
      DOM.power.classList.toggle('is-active', state.powerOn);
      DOM.power.setAttribute('aria-pressed', String(state.powerOn));

      Object.entries(DOM).forEach(([command, button]) => {
        if (!button || command === 'power') return;

        const active = isCommandActive(command);
        const blocked = isAutoActive() && DEAD_IN_AUTO.has(command);

        button.classList.toggle('is-active', active);
        button.setAttribute('aria-pressed', String(active));
        paintBlocked(button, blocked);
      });

      window.__chairVirtualState = {
        powerOn: state.powerOn,
        bytes: { ...state.bytes },
        semantic: { ...state.semantic },
        pulse: Array.from(pulseState)
      };
    }

    root.addEventListener('click', (event) => {
      const button = event.target.closest('.js-toggle');
      if (!button) return;

      if (button === DOM.power) {
        state.powerOn = !state.powerOn;

        if (!state.powerOn) {
          clearSemantic();
          setBytes(0x00, 0x00, 0x00, 0x00);

          pulseTimers.forEach((timer) => clearTimeout(timer));
          pulseTimers.clear();
          pulseState.clear();
        }

        render();
        return;
      }

      const command = buttonToCommand.get(button);
      if (!command) return;

      handleCommand(command);
      render();
    });

    render();
  })();
</script>
</body>
</html>
