<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Massage Chair Control Panel</title>
  <style>
    :root {
      --panel-bg: #000;
      --screen-bg: #fff;
      --ink: #fff;
      --accent: #f00;
      --active-fill: #fff;
      --active-text: #000;
      --font-ui: Inter, Arial, Helvetica, sans-serif;
      --panel-ratio: 1.7868020305;
      --font-landscape: clamp(.72rem, 1.18vw, 1.5rem);
      --font-portrait: clamp(.94rem, 2.55vw, 1.32rem);
      --gap-portrait: clamp(.72rem, 2.2vw, 1.05rem);
      --pad-portrait: clamp(.78rem, 2.8vw, 1.15rem);
      --power-portrait: clamp(4.4rem, 18vw, 6rem);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-block-size: 100%;
    }

    body {
      display: grid;
      place-items: center;
      min-block-size: 100dvh;
      overflow: hidden;
      background: var(--panel-bg);
      color: var(--ink);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      user-select: none;
    }

    .defs {
      position: fixed;
      inline-size: 0;
      block-size: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .panel {
      inline-size: min(100vw, calc(100dvh * var(--panel-ratio)));
      aspect-ratio: 1408 / 788;
      display: grid;
      grid-template-columns: 22fr 3.5fr 126fr 15.5fr 68fr 129fr 700fr 127fr 66fr 147fr 4fr;
      grid-template-rows: 14fr 538fr 45fr 177fr 14fr;
      background: var(--panel-bg);
      overflow: hidden;
      isolation: isolate;
    }

    .screen,
    .stack,
    .bottom-grid,
    .power {
      min-inline-size: 0;
      min-block-size: 0;
    }

    .screen {
      grid-column: 7;
      grid-row: 2;
      inline-size: 100%;
      block-size: auto;
      aspect-ratio: 700 / 470;
      align-self: start;
      background: var(--screen-bg);
      transform: translateY(.212766%);
    }


    .screen {
      overflow: hidden;
    }

    .screen > svg,
    .screen .screen-svg {
      display: block;
      inline-size: 100%;
      block-size: 100%;
    }

    .screen:not(.is-ready) > svg {
      visibility: hidden;
    }

    .controls {
      display: contents;
    }

    .stack {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 78fr 14fr 78fr 14fr 78fr 14fr 78fr 14fr 78fr 14fr 78fr;
      align-self: stretch;
    }

    .stack > .btn:nth-child(1) { grid-row: 1; }
    .stack > .btn:nth-child(2) { grid-row: 3; }
    .stack > .btn:nth-child(3) { grid-row: 5; }
    .stack > .btn:nth-child(4) { grid-row: 7; }
    .stack > .btn:nth-child(5) { grid-row: 9; }
    .stack > .btn:nth-child(6) { grid-row: 11; }

    .stack--left {
      grid-column: 2 / 6;
      grid-row: 2;
    }

    .stack--right {
      grid-column: 9 / 11;
      grid-row: 2;
    }

    .bottom-grid {
      grid-column: 5 / 10;
      grid-row: 4;
      display: grid;
      grid-template-columns: 202fr 20fr 202fr 20fr 202fr 20fr 202fr 20fr 202fr;
      grid-template-rows: 81fr 15fr 81fr;
    }

    .bottom-grid > .btn:nth-child(1) { grid-column: 1; grid-row: 1; }
    .bottom-grid > .btn:nth-child(2) { grid-column: 3; grid-row: 1; }
    .bottom-grid > .btn:nth-child(3) { grid-column: 5; grid-row: 1; }
    .bottom-grid > .btn:nth-child(4) { grid-column: 7; grid-row: 1; }
    .bottom-grid > .btn:nth-child(5) { grid-column: 9; grid-row: 1; }
    .bottom-grid > .btn:nth-child(6) { grid-column: 1; grid-row: 3; }
    .bottom-grid > .btn:nth-child(7) { grid-column: 3; grid-row: 3; }
    .bottom-grid > .btn:nth-child(8) { grid-column: 5; grid-row: 3; }
    .bottom-grid > .btn:nth-child(9) { grid-column: 7; grid-row: 3; }
    .bottom-grid > .btn:nth-child(10) { grid-column: 9; grid-row: 3; }

    .btn,
    .power {
      position: relative;
      display: grid;
      place-items: center;
      inline-size: 100%;
      margin: 0;
      padding: 0;
      border: 0;
      outline: 0;
      appearance: none;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: filter .14s ease;
    }

    .stack .btn,
    .bottom-grid .btn {
      block-size: 100%;
    }

    .shape,
    .power-svg {
      position: absolute;
      inset: 0;
      inline-size: 100%;
      block-size: 100%;
      display: block;
      overflow: visible;
      pointer-events: none;
    }

    .shape__fill,
    .power__fill {
      fill: transparent;
      transition: fill .14s ease;
    }

    .shape__stroke,
    .power__stroke {
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      transition: stroke .14s ease;
    }

    .label {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      gap: .08em;
      inline-size: 100%;
      padding-inline: .55em;
      padding-block-end: .22em;
      color: currentColor;
      font-size: var(--font-landscape);
      line-height: 1.08;
      text-align: center;
      pointer-events: none;
    }

    .btn:is(:hover, :focus-visible),
    .power:is(:hover, :focus-visible) {
      filter: brightness(1.06);
    }

    .btn.is-active .shape__fill,
    .power.is-active .power__fill {
      fill: var(--active-fill) !important;
    }

    .btn.is-active,
    .btn.is-active .label,
    .btn.is-active .shape__stroke,
    .power.is-active,
    .power.is-active .power__stroke {
      color: var(--active-text) !important;
      stroke: var(--active-text) !important;
    }

    .power {
      grid-column: 3;
      grid-row: 4;
      align-self: start;
      justify-self: stretch;
      block-size: auto;
      aspect-ratio: 1;
      transform: translateY(20.238095%);
    }

    .power__fill {
      fill: var(--accent);
    }

    @media (orientation: portrait) {
      body {
        place-items: stretch;
        overflow: hidden;
      }

      .panel {
        inline-size: 100vw;
        block-size: 100dvh;
        aspect-ratio: auto;
        grid-template-columns: 1fr;
        grid-template-rows: minmax(22svh, 32svh) auto minmax(0, 1fr);
        padding: var(--pad-portrait);
        row-gap: var(--gap-portrait);
        overflow: hidden;
      }

      .controls {
        grid-column: 1;
        grid-row: 3;
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--gap-portrait);
        min-block-size: 0;
        overflow: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding-inline-end: .12rem;
      }

      .screen {
        grid-column: 1;
        grid-row: 1;
        inline-size: 100%;
        block-size: 100%;
        aspect-ratio: auto;
        transform: none;
      }

      .power {
        grid-column: 1;
        grid-row: 2;
        inline-size: var(--power-portrait);
        justify-self: start;
        transform: none;
      }

      .stack,
      .bottom-grid {
        grid-column: 1;
      }

      .stack {
        grid-template-columns: 1fr;
        grid-template-rows: none;
        gap: var(--gap-portrait);
      }

      .stack > .btn:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
      }

      .stack--left {
        grid-row: auto;
      }

      .stack--right {
        grid-row: auto;
      }

      .bottom-grid {
        grid-row: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: none;
        gap: var(--gap-portrait);
        align-content: start;
        min-block-size: 0;
        padding-block-end: .4rem;
      }

      .bottom-grid > .btn:nth-child(n) {
        grid-column: auto;
        grid-row: auto;
      }

      .stack .btn {
        block-size: auto;
        aspect-ratio: 213 / 78;
      }

      .bottom-grid .btn {
        block-size: auto;
        aspect-ratio: 202 / 81;
      }

      .label {
        font-size: var(--font-portrait);
        padding-inline: .72em;
        padding-block-end: .2em;
      }
    }

    @media (orientation: portrait) and (max-width: 30rem) {
      .bottom-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn,
      .power,
      .shape__fill,
      .shape__stroke,
      .power__fill,
      .power__stroke {
        transition: none;
      }
    }
  </style>
</head>

          <span class="label"><span>Prędkość masażu</span><span>stóp</span></span>

        <button class="btn js-toggle" type="button" aria-pressed="false">

          <span class="label"><span>Tryb</span><span>automatyczny</span></span>
        </button>
        <button class="btn js-toggle" type="button" aria-pressed="false">
          <svg class="shape" viewBox="0 0 202 81" aria-hidden="true"><use href="#shape-bottom" class="shape__fill"></use><use href="#shape-bottom" class="shape__stroke" stroke-width="2.75"></use></svg>

  </main>

  <script>

  (() => {
    const root = document;
    const screen = root.querySelector('.screen');
    const screenSvg = screen ? screen.querySelector('svg') : null;

    const powerButton = root.querySelector('.power');
    const leftButtons = Array.from(root.querySelectorAll('.stack--left .btn'));
    const rightButtons = Array.from(root.querySelectorAll('.stack--right .btn'));
    const bottomButtons = Array.from(root.querySelectorAll('.bottom-grid .btn'));

    const DOM = {
      power: powerButton,

      // Left stack
      ramiona: leftButtons[0],
      przedramiona: leftButtons[1],
      nogi: leftButtons[2],
      sila_nacisku_plus: leftButtons[3],
      sila_nacisku_minus: leftButtons[4],
      masaz_posladkow: leftButtons[5],

      // Right stack
      szyja: rightButtons[0],
      do_przodu_do_tylu_2: rightButtons[1],    // button above "Plecy i talia"
      plecy_i_talia: rightButtons[2],
      do_przodu_do_tylu_1: rightButtons[3],    // button above "Prędkość +"
      predkosc_plus: rightButtons[4],
      predkosc_minus: rightButtons[5],

      // Bottom grid
      masaz_stop: bottomButtons[0],
      pauza: bottomButtons[1],
      czas: bottomButtons[2],
      grawitacja_zero: bottomButtons[3],
      oparcie_w_gore: bottomButtons[4],
      predkosc_masazu_stop: bottomButtons[5],
      ogrzewanie: bottomButtons[6],
      masaz_calego_ciala: bottomButtons[7],
      tryb_automatyczny: bottomButtons[8],
      oparcie_w_dol: bottomButtons[9]
    };

    const buttonToCommand = new Map(
      Object.entries(DOM)
        .filter(([key, button]) => key !== 'power' && button)
        .map(([key, button]) => [button, key])
    );

    const AUTO_DISABLED = new Set([
      'predkosc_plus',
      'predkosc_minus',
      'do_przodu_do_tylu_1',
      'do_przodu_do_tylu_2'
    ]);

    const MOMENTARY_COMMANDS = new Set([
      'sila_nacisku_plus',
      'sila_nacisku_minus',
      'predkosc_plus',
      'predkosc_minus',
      'do_przodu_do_tylu_1',
      'do_przodu_do_tylu_2',
      'grawitacja_zero',
      'oparcie_w_gore',
      'oparcie_w_dol'
    ]);

    const ZONE_COMMANDS = [
      'ramiona',
      'przedramiona',
      'nogi',
      'masaz_posladkow',
      'masaz_stop',
      'ogrzewanie',
      'szyja',
      'plecy_i_talia'
    ];

    const MANAGED_LAYERS = [
      'Body',
      'Ramiona',
      'Przedramiona',
      'Nogi',
      'Masaz_Posladkow',
      'Masaz_Stop',
      'Ogrzewanie',
      'Szyja',
      '? Szyja',
      'Plecy_i_talia',
      '? Plecy_i_talia',
      'Sila_nacisku-TEXT',
      'Sila_nacisku-LVL1',
      'Sila_nacisku-LVL2',
      'Sila_nacisku-LVL3',
      'PredkoscTEXT',
      'Predkosc-LVL1',
      'Predkosc-LVL2',
      'Predkosc-LVL3',
      'Predkosc_masazu_stop',
      'Predkosc_masazu_stop-LVL1',
      'Predkosc_masazu_stop-LVL2',
      'Predkosc_masazu_stop-LVL3',
      'Czas-TEXT',
      'Czas-NUMBER',
      'SHAPE_CHECK-TEXT',
      'Tryb_manualny',
      'Tryb_automatyczny',
      'Tryb_automatyczny-A',
      'Tryb_automatyczny-B',
      'Tryb_automatyczny-C',
      'Tryb_automatyczny-D'
    ];

    const pulseState = new Set();
    const pulseTimers = new Map();
    const PULSE_MS = 180;
    const POWER_OFF_BLINK_MS = 180;

    const svgLayers = new Map();

    const state = {
      powerOn: false,

      bytes: {
        3: 0x00,
        4: 0x00,
        5: 0x00,
        6: 0x00
      },

      semantic: {
        sharedOwner: null,
        intensity: 2,
        auto: false,
        fullBody: false,
        neck: false,
        backWaist: false,
        clearSource: null,
        autoHideFootSpeed: false
      },

      mode: 'off',
      autoProgram: 'A',
      paused: false,

      active: {
        ramiona: false,
        przedramiona: false,
        nogi: false,
        masaz_posladkow: false,
        masaz_stop: false,
        ogrzewanie: false,
        szyja: false,
        plecy_i_talia: false
      },

      levels: {
        intensity: 2,
        speed: 2,
        footSpeed: 2
      },

      direction: {
        neck: 1,
        back: 1
      },

      timing: {
        selectedMinutes: 15,
        remainingSeconds: 15 * 60,
        flashText: ''
      },

      transient: {
        check: false,
        isolate: false,
        poweringOff: false
      },

      timers: {
        countdown: null,
        flashText: null,
        transient: null,
        powerOff: []
      }
    };

    function readLayerLabel(element) {
      return (
        element.getAttribute('inkscape:label') ||
        element.getAttribute('label') ||
        Array.from(element.attributes || []).find((attribute) => attribute.name.endsWith(':label'))?.value ||
        ''
      );
    }

    function buildSvgLayerMap() {
      if (!screenSvg) return;

      screenSvg.querySelectorAll('*').forEach((element) => {
        const label = readLayerLabel(element);
        if (!label) return;

        if (!svgLayers.has(label)) {
          svgLayers.set(label, []);
        }

        svgLayers.get(label).push(element);
      });
    }

    function withLayer(label, callback) {
      const elements = svgLayers.get(label) || [];
      elements.forEach(callback);
    }

    function setLayerVisible(label, visible, mode = 'display') {
      withLayer(label, (element) => {
        if (mode === 'opacity') {
          element.style.opacity = visible ? '' : '0';
          element.style.pointerEvents = 'none';
        } else {
          element.style.display = visible ? '' : 'none';
        }
      });
    }

    function setLayerText(label, value) {
      withLayer(label, (element) => {
        element.textContent = String(value);
      });
    }

    function showOnlyLayers(labels) {
      MANAGED_LAYERS.forEach((label) => {
        setLayerVisible(label, labels.has(label));
      });
    }

    function setBytes(b3, b4, b5, b6) {
      state.bytes[3] = b3;
      state.bytes[4] = b4;
      state.bytes[5] = b5;
      state.bytes[6] = b6;
    }

    function clearSemantic() {
      state.semantic.sharedOwner = null;
      state.semantic.intensity = state.levels.intensity;
      state.semantic.auto = false;
      state.semantic.fullBody = false;
      state.semantic.neck = false;
      state.semantic.backWaist = false;
      state.semantic.clearSource = null;
      state.semantic.autoHideFootSpeed = false;
    }

    function clearPulseState() {
      pulseTimers.forEach((timer) => clearTimeout(timer));
      pulseTimers.clear();
      pulseState.clear();
    }

    function clearTimerBucket(bucket) {
      if (!bucket) return;
      bucket.forEach((timer) => clearTimeout(timer));
      bucket.length = 0;
    }

    function stopCountdown() {
      if (state.timers.countdown) {
        clearInterval(state.timers.countdown);
        state.timers.countdown = null;
      }
    }

    function startCountdown() {
      stopCountdown();

      state.timers.countdown = setInterval(() => {
        if (!state.powerOn) return;
        if (state.paused) return;
        if (state.transient.poweringOff) return;
        if (state.timing.flashText && /^F[1-4]$/i.test(state.timing.flashText)) return;

        state.timing.remainingSeconds = Math.max(0, state.timing.remainingSeconds - 1);
        render();
      }, 1000);
    }

    function setCountdownMinutes(minutes) {
      state.timing.selectedMinutes = minutes;
      state.timing.remainingSeconds = minutes * 60;
    }

    function cycleCountdownMinutes() {
      const loop = [15, 20, 25, 30];
      const currentIndex = loop.indexOf(state.timing.selectedMinutes);
      const nextValue = loop[(currentIndex + 1) % loop.length];
      setCountdownMinutes(nextValue);
    }

    function currentMinuteDisplay() {
      if (state.transient.poweringOff) return 'OF';
      if (state.timing.flashText) return state.timing.flashText;
      if (!state.powerOn) return '';
      if (state.timing.remainingSeconds <= 0) return '0';
      return String(Math.ceil(state.timing.remainingSeconds / 60));
    }

    function showIntensityUi() {
      return isRunningSignature() && (
        state.active.ramiona ||
        state.active.przedramiona ||
        state.active.nogi
      );
    }

    function showSpeedUi() {
      return isRunningSignature() && (
        state.active.szyja ||
        state.active.plecy_i_talia
      );
    }

    function canAdjustFootSpeed() {
      return isRunningSignature() && state.active.masaz_stop;
    }

    function showFootSpeedUi() {
      return canAdjustFootSpeed() && !state.semantic.autoHideFootSpeed;
    }

    function updateProtocolBytes() {
      const modeByte = !state.powerOn
        ? 0x00
        : state.mode === 'auto'
          ? 0x05
          : 0x17;

      const programByte = !state.powerOn
        ? 0x00
        : state.mode === 'auto'
          ? ({ A: 0x0A, B: 0x0B, C: 0x0C, D: 0x0D }[state.autoProgram] || 0x0A)
          : state.active.szyja
            ? 0x19
            : state.active.plecy_i_talia
              ? 0x17
              : 0x01;

      const levelByte = ((state.levels.intensity & 0x0F) << 4) | (state.levels.speed & 0x0F);
      const footPauseByte = ((state.levels.footSpeed & 0x0F) << 4) | (state.paused ? 0x0B : 0x00);

      setBytes(modeByte, programByte, levelByte, footPauseByte);
    }

    function syncSemantic(lastCommand = state.semantic.sharedOwner) {
      state.semantic.sharedOwner = lastCommand;
      state.semantic.intensity = state.levels.intensity;
      state.semantic.auto = state.mode === 'auto';
      state.semantic.fullBody = !!(state.active.ramiona && state.active.przedramiona && state.active.nogi);
      state.semantic.neck = !!state.active.szyja;
      state.semantic.backWaist = !!state.active.plecy_i_talia;
      state.semantic.clearSource = state.transient.isolate ? 'temporary' : null;
      state.semantic.autoHideFootSpeed = state.mode === 'auto' && state.autoProgram === 'C';
      updateProtocolBytes();
    }

    function isRunningSignature() {
      return state.powerOn && state.mode !== 'off';
    }

    function isAutoActive() {
      return state.powerOn && state.mode === 'auto';
    }

    function pulseCommand(command) {
      pulseState.add(command);

      const existingTimer = pulseTimers.get(command);
      if (existingTimer) clearTimeout(existingTimer);

      const timer = setTimeout(() => {
        pulseState.delete(command);
        pulseTimers.delete(command);
        render();
      }, PULSE_MS);

      pulseTimers.set(command, timer);
    }

    function clearZones() {
      ZONE_COMMANDS.forEach((key) => {
        state.active[key] = false;
      });
    }

    function resetDynamicState() {
      state.mode = 'off';
      state.autoProgram = 'A';
      state.paused = false;
      clearZones();
      state.levels.intensity = 2;
      state.levels.speed = 2;
      state.levels.footSpeed = 2;
      state.direction.neck = 1;
      state.direction.back = 1;
      setCountdownMinutes(15);
      state.timing.flashText = '';
      state.transient.check = false;
      state.transient.isolate = false;
      state.transient.poweringOff = false;
      clearSemantic();
      updateProtocolBytes();
    }

    function applyFeatureState(nextActive) {
      clearZones();
      Object.entries(nextActive).forEach(([key, value]) => {
        if (key in state.active) {
          state.active[key] = !!value;
        }
      });
    }

    function applyAutoPreset(presetName) {
      state.mode = 'auto';
      state.paused = false;
      state.levels.intensity = 2;
      state.levels.speed = 2;
      state.levels.footSpeed = 2;
      state.transient.check = false;
      state.transient.isolate = false;

      if (presetName === 'POWER_ON_DEFAULT') {
        state.autoProgram = 'A';
        applyFeatureState({
          ramiona: true,
          przedramiona: true,
          nogi: true,
          masaz_posladkow: false,
          masaz_stop: true,
          ogrzewanie: false,
          szyja: true,
          plecy_i_talia: true
        });
      } else if (presetName === 'A') {
        state.autoProgram = 'A';
        applyFeatureState({
          ramiona: true,
          przedramiona: true,
          nogi: true,
          masaz_posladkow: false,
          masaz_stop: false,
          ogrzewanie: false,
          szyja: false,
          plecy_i_talia: false
        });
      } else if (presetName === 'B') {
        state.autoProgram = 'B';
        applyFeatureState({
          ramiona: true,
          przedramiona: true,
          nogi: true,
          masaz_posladkow: true,
          masaz_stop: true,
          ogrzewanie: false,
          szyja: true,
          plecy_i_talia: true
        });
      } else if (presetName === 'C') {
        state.autoProgram = 'C';
        applyFeatureState({
          ramiona: false,
          przedramiona: true,
          nogi: true,
          masaz_posladkow: false,
          masaz_stop: true,
          ogrzewanie: false,
          szyja: false,
          plecy_i_talia: false
        });
      } else if (presetName === 'D') {
        state.autoProgram = 'D';
        applyFeatureState({
          ramiona: true,
          przedramiona: true,
          nogi: true,
          masaz_posladkow: true,
          masaz_stop: true,
          ogrzewanie: false,
          szyja: true,
          plecy_i_talia: true
        });
      }

      syncSemantic('tryb_automatyczny');
    }

    function turnPowerOn() {
      state.powerOn = true;
      clearTimerBucket(state.timers.powerOff);
      if (state.timers.flashText) {
        clearTimeout(state.timers.flashText);
        state.timers.flashText = null;
      }
      if (state.timers.transient) {
        clearTimeout(state.timers.transient);
        state.timers.transient = null;
      }
      clearPulseState();
      resetDynamicState();
      applyAutoPreset('POWER_ON_DEFAULT');
      setCountdownMinutes(15);
      startCountdown();
      render();
    }

    function finalizePowerOff() {
      state.powerOn = false;
      stopCountdown();
      clearPulseState();
      clearTimerBucket(state.timers.powerOff);
      if (state.timers.flashText) {
        clearTimeout(state.timers.flashText);
        state.timers.flashText = null;
      }
      if (state.timers.transient) {
        clearTimeout(state.timers.transient);
        state.timers.transient = null;
      }
      resetDynamicState();
      render();
    }

    function turnPowerOff() {
      if (!state.powerOn || state.transient.poweringOff) return;

      stopCountdown();
      clearPulseState();
      clearTimerBucket(state.timers.powerOff);
      if (state.timers.flashText) {
        clearTimeout(state.timers.flashText);
        state.timers.flashText = null;
      }
      if (state.timers.transient) {
        clearTimeout(state.timers.transient);
        state.timers.transient = null;
      }

      state.transient.poweringOff = true;
      state.transient.isolate = false;
      state.transient.check = false;
      state.timing.flashText = 'OF';
      render();

      for (let step = 0; step < 6; step += 1) {
        state.timers.powerOff.push(
          setTimeout(() => {
            state.transient.check = step % 2 === 0;
            render();
          }, POWER_OFF_BLINK_MS * (step + 1))
        );
      }

      state.timers.powerOff.push(
        setTimeout(() => {
          finalizePowerOff();
        }, POWER_OFF_BLINK_MS * 8)
      );
    }

    function flashTimeText(text, duration = 1000, after = null) {
      if (state.timers.flashText) {
        clearTimeout(state.timers.flashText);
      }

      state.timing.flashText = text;
      render();

      state.timers.flashText = setTimeout(() => {
        state.timing.flashText = '';
        state.timers.flashText = null;
        if (typeof after === 'function') {
          after();
        }
        render();
      }, duration);
    }

    function triggerCheckFlash(duration = 1000) {
      if (!state.powerOn || state.transient.poweringOff) return;

      if (state.timers.transient) {
        clearTimeout(state.timers.transient);
      }

      state.transient.check = true;
      state.transient.isolate = true;
      syncSemantic('check_flash');
      render();

      state.timers.transient = setTimeout(() => {
        state.transient.check = false;
        state.transient.isolate = false;
        state.timers.transient = null;
        syncSemantic(state.semantic.sharedOwner);
        render();
      }, duration);
    }

    function switchToManual(zoneKey) {
      state.mode = 'manual';
      state.paused = false;
      state.transient.check = false;
      state.transient.isolate = false;
      clearZones();
      state.active[zoneKey] = true;
      syncSemantic(zoneKey);
      flashTimeText(zoneKey === 'szyja' ? `A${state.direction.neck}` : `b${state.direction.back}`, 1000);
    }

    function switchToAutoDefault() {
      applyAutoPreset('POWER_ON_DEFAULT');
      setCountdownMinutes(15);
      startCountdown();
      render();
    }

    function cycleAutoProgram() {
      const order = ['A', 'B', 'C', 'D'];
      const currentIndex = order.indexOf(state.autoProgram);
      const nextProgram = order[(currentIndex + 1) % order.length];
      const flashMap = {
        A: 'F1',
        B: 'F2',
        C: 'F3',
        D: 'F4'
      };

      stopCountdown();
      applyAutoPreset(nextProgram);
      setCountdownMinutes(15);
      flashTimeText(flashMap[nextProgram], 1000, () => {
        startCountdown();
      });
      render();
    }

    function toggleFeature(command) {
      state.active[command] = !state.active[command];
      syncSemantic(command);
    }

    function toggleFullBody() {
      const allOn = state.active.ramiona && state.active.przedramiona && state.active.nogi;
      state.active.ramiona = !allOn;
      state.active.przedramiona = !allOn;
      state.active.nogi = !allOn;
      syncSemantic('masaz_calego_ciala');
    }

    function toggleManualDirectionalZone(command) {
      const isTurningOn = !state.active[command];
      state.active[command] = isTurningOn;
      syncSemantic(command);

      if (isTurningOn) {
        flashTimeText(command === 'szyja' ? `A${state.direction.neck}` : `b${state.direction.back}`, 1000);
      }
    }

    function cycleDirection(which) {
      if (which === 'neck') {
        state.direction.neck = state.direction.neck === 1 ? 2 : 1;
        flashTimeText(`A${state.direction.neck}`, 1000);
        syncSemantic('do_przodu_do_tylu_2');
      } else {
        state.direction.back = state.direction.back === 1 ? 2 : 1;
        flashTimeText(`b${state.direction.back}`, 1000);
        syncSemantic('do_przodu_do_tylu_1');
      }
    }

    function handleCommand(command) {
      if (!state.powerOn || state.transient.poweringOff) return;

      if (command !== 'pauza' && state.paused) {
        return;
      }

      if (isCommandBlocked(command)) {
        return;
      }

      if (MOMENTARY_COMMANDS.has(command)) {
        pulseCommand(command);
      }

      switch (command) {
        case 'ramiona':
        case 'przedramiona':
        case 'nogi':
        case 'masaz_posladkow':
        case 'masaz_stop':
        case 'ogrzewanie':
          toggleFeature(command);
          break;

        case 'sila_nacisku_plus':
          if (showIntensityUi()) {
            state.levels.intensity = Math.min(3, state.levels.intensity + 1);
            syncSemantic(command);
          }
          break;

        case 'sila_nacisku_minus':
          if (showIntensityUi()) {
            state.levels.intensity = Math.max(1, state.levels.intensity - 1);
            syncSemantic(command);
          }
          break;

        case 'predkosc_masazu_stop':
          if (canAdjustFootSpeed()) {
            state.levels.footSpeed = state.levels.footSpeed === 3 ? 1 : state.levels.footSpeed + 1;
            syncSemantic(command);
          }
          break;

        case 'pauza':
          state.paused = !state.paused;
          syncSemantic(command);
          break;

        case 'czas':
          cycleCountdownMinutes();
          syncSemantic(command);
          break;

        case 'masaz_calego_ciala':
          toggleFullBody();
          break;

        case 'grawitacja_zero':
          syncSemantic(command);
          triggerCheckFlash(1000);
          break;

        case 'oparcie_w_gore':
          syncSemantic(command);
          triggerCheckFlash(400);
          break;

        case 'oparcie_w_dol':
          syncSemantic(command);
          triggerCheckFlash(400);
          break;

        case 'tryb_automatyczny':
          if (state.mode === 'auto') {
            cycleAutoProgram();
          } else {
            switchToAutoDefault();
          }
          break;

        case 'predkosc_plus':
          if (state.mode === 'manual' && showSpeedUi()) {
            state.levels.speed = Math.min(3, state.levels.speed + 1);
            syncSemantic(command);
          }
          break;

        case 'predkosc_minus':
          if (state.mode === 'manual' && showSpeedUi()) {
            state.levels.speed = Math.max(1, state.levels.speed - 1);
            syncSemantic(command);
          }
          break;

        case 'do_przodu_do_tylu_1':
          if (state.mode === 'manual' && state.active.plecy_i_talia) {
            cycleDirection('back');
          }
          break;

        case 'do_przodu_do_tylu_2':
          if (state.mode === 'manual' && state.active.szyja) {
            cycleDirection('neck');
          }
          break;

        case 'plecy_i_talia':
          if (state.mode === 'auto') {
            switchToManual('plecy_i_talia');
          } else {
            toggleManualDirectionalZone('plecy_i_talia');
          }
          break;

        case 'szyja':
          if (state.mode === 'auto') {
            switchToManual('szyja');
          } else {
            toggleManualDirectionalZone('szyja');
          }
          break;

        default:
          break;
      }
    }

    function isCommandBlocked(command) {
      if (command === 'power') return false;

      if (!state.powerOn || state.transient.poweringOff) return true;

      if (state.paused) {
        return command !== 'pauza';
      }

      if (state.mode === 'auto' && AUTO_DISABLED.has(command)) {
        return true;
      }

      switch (command) {
        case 'sila_nacisku_plus':
        case 'sila_nacisku_minus':
          return !showIntensityUi();

        case 'predkosc_masazu_stop':
          return !canAdjustFootSpeed();

        case 'predkosc_plus':
        case 'predkosc_minus':
          return state.mode !== 'manual' || !showSpeedUi();

        case 'do_przodu_do_tylu_1':
          return state.mode !== 'manual' || !state.active.plecy_i_talia;

        case 'do_przodu_do_tylu_2':
          return state.mode !== 'manual' || !state.active.szyja;

        default:
          return false;
      }
    }

    function isCommandActive(command) {
      if (pulseState.has(command)) return true;

      switch (command) {
        case 'ramiona':
          return !!state.active.ramiona;

        case 'przedramiona':
          return !!state.active.przedramiona;

        case 'nogi':
          return !!state.active.nogi;

        case 'masaz_posladkow':
          return !!state.active.masaz_posladkow;

        case 'masaz_stop':
          return !!state.active.masaz_stop;

        case 'ogrzewanie':
          return !!state.active.ogrzewanie;

        case 'szyja':
          return !!state.active.szyja;

        case 'plecy_i_talia':
          return !!state.active.plecy_i_talia;

        case 'pauza':
          return !!state.paused;

        case 'masaz_calego_ciala':
          return !!(state.active.ramiona && state.active.przedramiona && state.active.nogi);

        case 'tryb_automatyczny':
          return isAutoActive();

        default:
          return false;
      }
    }

    function paintBlocked(button, blocked) {
      button.setAttribute('aria-disabled', String(blocked));
      button.style.opacity = blocked ? '0.38' : '';
      button.style.filter = blocked ? 'grayscale(1)' : '';
      button.style.cursor = blocked ? 'not-allowed' : '';
    }

    function computeVisibleLayers() {
      const visible = new Set();

      if (state.transient.poweringOff) {
        visible.add('Czas-NUMBER');
        if (state.transient.check) {
          visible.add('SHAPE_CHECK-TEXT');
        }
        return visible;
      }

      if (!state.powerOn) {
        return visible;
      }

      visible.add('Body');
      visible.add('Czas-TEXT');
      visible.add('Czas-NUMBER');

      if (state.mode === 'auto') {
        visible.add('Tryb_automatyczny');
        visible.add(`Tryb_automatyczny-${state.autoProgram}`);
      } else if (state.mode === 'manual') {
        visible.add('Tryb_manualny');
      }

      if (state.active.ramiona) visible.add('Ramiona');
      if (state.active.przedramiona) visible.add('Przedramiona');
      if (state.active.nogi) visible.add('Nogi');
      if (state.active.masaz_posladkow) visible.add('Masaz_Posladkow');
      if (state.active.masaz_stop) visible.add('Masaz_Stop');
      if (state.active.ogrzewanie) visible.add('Ogrzewanie');

      if (state.active.szyja) {
        visible.add('Szyja');
        visible.add('? Szyja');
      }

      if (state.active.plecy_i_talia) {
        visible.add('Plecy_i_talia');
        visible.add('? Plecy_i_talia');
      }

      if (showIntensityUi()) {
        visible.add('Sila_nacisku-TEXT');
        visible.add(`Sila_nacisku-LVL${state.levels.intensity}`);
      }

      if (showSpeedUi()) {
        visible.add('PredkoscTEXT');
        visible.add(`Predkosc-LVL${state.levels.speed}`);
      }

      if (showFootSpeedUi()) {
        visible.add('Predkosc_masazu_stop');
        visible.add(`Predkosc_masazu_stop-LVL${state.levels.footSpeed}`);
      }

      if (state.transient.check) {
        visible.add('SHAPE_CHECK-TEXT');
      }

      if (state.transient.isolate) {
        const isolated = new Set(['Body', 'Czas-TEXT', 'Czas-NUMBER']);
        if (state.transient.check) {
          isolated.add('SHAPE_CHECK-TEXT');
        }
        return isolated;
      }

      return visible;
    }

    function renderSvg() {
      const visibleLayers = computeVisibleLayers();
      showOnlyLayers(visibleLayers);

      const currentText = currentMinuteDisplay();
      if (currentText) {
        setLayerText('Czas-NUMBER', currentText);
        setLayerVisible('Czas-NUMBER', true);
      } else {
        setLayerVisible('Czas-NUMBER', false);
      }
    }

    function renderButtons() {
      DOM.power.classList.toggle('is-active', state.powerOn && !state.transient.poweringOff);
      DOM.power.setAttribute('aria-pressed', String(state.powerOn && !state.transient.poweringOff));

      Object.entries(DOM).forEach(([command, button]) => {
        if (!button || command === 'power') return;

        const active = isCommandActive(command);
        const blocked = isCommandBlocked(command);

        button.classList.toggle('is-active', active);
        button.setAttribute('aria-pressed', String(active));
        paintBlocked(button, blocked);
      });
    }

    function render() {
      renderSvg();
      renderButtons();

      if (screen) {
        screen.classList.add('is-ready');
      }

      window.__chairVirtualState = {
        powerOn: state.powerOn,
        mode: state.mode,
        autoProgram: state.autoProgram,
        paused: state.paused,
        bytes: { ...state.bytes },
        semantic: { ...state.semantic },
        active: { ...state.active },
        levels: { ...state.levels },
        direction: { ...state.direction },
        timing: {
          selectedMinutes: state.timing.selectedMinutes,
          remainingSeconds: state.timing.remainingSeconds,
          display: currentMinuteDisplay()
        },
        pulse: Array.from(pulseState)
      };
    }

    buildSvgLayerMap();
    resetDynamicState();
    render();

    root.addEventListener('click', (event) => {
      const button = event.target.closest('.js-toggle');
      if (!button) return;

      if (button === DOM.power) {
        if (state.powerOn) {
          turnPowerOff();
        } else {
          turnPowerOn();
        }
        return;
      }

      const command = buttonToCommand.get(button);
      if (!command) return;

      handleCommand(command);
      render();
    });
  })();

</script>
</body>
</html>
